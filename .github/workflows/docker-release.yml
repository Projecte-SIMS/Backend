name: Test & Build Release - Backend

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          coverage: none

      - name: Install Dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Copy .env.example
        run: cp .env.example .env

      - name: Generate Key
        run: php artisan key:generate

      - name: Run Tests
        run: php artisan test

  release:
    needs: test # Solo se ejecuta si los tests pasan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Pack Docker Image (AMD64 - Intel/Windows/Old Macs)
        run: |
          docker buildx build --platform linux/amd64 -t sims-backend:latest-amd64 --load .
          docker save -o sims-backend-amd64.tar sims-backend:latest-amd64

      - name: Build and Pack Docker Image (ARM64 - Apple Silicon M1/M2/M3)
        run: |
          docker buildx build --platform linux/arm64 -t sims-backend:latest-arm64 --load .
          docker save -o sims-backend-arm64.tar sims-backend:latest-arm64

      - name: Create or Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Production Build
          files: |
            sims-backend-amd64.tar
            sims-backend-arm64.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
