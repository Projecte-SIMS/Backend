name: Build & Release (Skip Tests) - Backend

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Permite ejecución manual

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Pack Docker Image (AMD64 - Intel/Windows/Old Macs)
        run: |
          docker buildx build --platform linux/amd64 -t sims-backend:latest-amd64 --load .
          docker save -o sims-backend-amd64.tar sims-backend:latest-amd64

      - name: Create or Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Production Build
          files: |
            sims-backend-amd64.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
