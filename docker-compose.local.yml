version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: project-sims-backend:local
    container_name: project_sims_app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env.local
    environment:
      DB_HOST: db
      DB_CONNECTION: pgsql
      DB_PORT: 5432
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
      - storage:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sims_network
    command: >
      sh -c "php artisan config:cache &&
             php artisan migrate --force &&
             php artisan db:seed --force &&
             php artisan serve --host=0.0.0.0 --port=8000"

  db:
    image: postgres:15-alpine
    container_name: project_sims_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-project_sims}
      POSTGRES_USER: ${DB_USERNAME:-project_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecret}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - sims_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-project_user} -d ${DB_DATABASE:-project_sims}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: project_sims_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - sims_network
    depends_on:
      - db

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  vendor:
    driver: local
  storage:
    driver: local
  bootstrap_cache:
    driver: local

networks:
  sims_network:
    driver: bridge
