services:
  - type: web
    name: sims-backend-api
    env: docker
    dockerContext: .
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: sims-db
          property: connectionString
      - key: OPEN_WEBUI_API_KEY
        sync: false
      - key: OPEN_WEBUI_BASE_URL
        value: https://api-ia.daw2.iesmontsia.org:3000/api
      - key: OPEN_WEBUI_MODEL
        value: llm-per-a-alumnat

databases:
  - name: sims-db
    plan: free
    databaseName: project_sims_backend
    user: admin_sims
