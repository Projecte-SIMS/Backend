services:
  - type: web
    name: sims-backend-api
    env: docker
    dockerContext: .
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: sims-db
          property: connectionString

databases:
  - name: sims-db
    plan: free
    databaseName: project_sims_landlord
    user: admin_sims
