version: '3.8'

# Docker Compose para entornos con PostgreSQL externo (similar a Render)
# Usar: docker-compose -f docker-compose.prod.yml up
# 
# Notas:
# - No incluye servicio de BD (se asume que existe en otro servidor)
# - Solo corre el aplicativo PHP
# - Requiere variables de entorno configuradas en .env.production

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: project-sims-backend:production
    container_name: project_sims_app_prod
    restart: always
    working_dir: /var/www/html
    env_file:
      - .env.production
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
      - storage:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    ports:
      - "8000:8000"
    networks:
      - sims_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      sh -c "php artisan config:cache &&
             php artisan migrate --force &&
             php artisan db:seed --force &&
             php artisan serve --host=0.0.0.0 --port=8000"

volumes:
  vendor:
    driver: local
  storage:
    driver: local
  bootstrap_cache:
    driver: local

networks:
  sims_network:
    driver: bridge
