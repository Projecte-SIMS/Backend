version: '3.8'

services:
  app:
    build: .
    image: project-sims-backend_app
    container_name: project_sims_app
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "9000:9000"
      - "8000:8000"
    command: ["php-fpm"]

  db:
    image: postgres:15
    container_name: project_sims_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: project_sims_pgadmin
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - db

volumes:
  postgres_data:
  pgadmin_data:
