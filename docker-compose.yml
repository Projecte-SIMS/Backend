services:
  app:
    build: .
    image: project-sims-backend_app
    container_name: project_sims_app
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
    working_dir: /var/www/html
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]

  db:
    image: postgres:15
    container_name: project_sims_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"

volumes:
  postgres_data:
  vendor:
